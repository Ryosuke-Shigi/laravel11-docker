; Development-oriented PHP settings for Laravel learning.
date.timezone = Asia/Tokyo

memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120

display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Opcache is enabled because Laravel commonly benefits from it, even in local experiments.
opcache.enable = 1
opcache.enable_cli = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
