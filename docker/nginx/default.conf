server {
    listen 80;
    server_name _;

    # Laravel will be installed later under /var/www/html, with public/ as the web root.
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 20M;

    # Send normal Laravel routes to public/index.php after Laravel is installed.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP execution to the php-fpm service over Docker's internal network.
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Hide dotfiles such as .env from the web server.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
