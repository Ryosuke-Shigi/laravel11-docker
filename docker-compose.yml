# Laravel 11 learning environment.
# Laravel itself is intentionally not installed yet; ./src is mounted as the future app root.

x-php-service: &php-service
  image: codex-practice001-php:8.3
  build:
    context: .
    dockerfile: docker/php/Dockerfile
    args:
      UID: 1000
      GID: 1000
  working_dir: /var/www/html
  volumes:
    # Keep Laravel source files editable from WSL/Windows while PHP runs in containers.
    - ./src:/var/www/html
  networks:
    - laravel

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      # Public HTTP endpoint. Only nginx should publish a public web port.
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - laravel

  php-fpm:
    <<: *php-service
    # Web requests from nginx are executed by PHP-FPM.
    command: php-fpm
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  php-cli:
    <<: *php-service
    # General PHP CLI runner. Example: docker compose run --rm php-cli -v
    entrypoint: ["php"]
    command: ["-v"]

  artisan:
    <<: *php-service
    # Dedicated Laravel artisan runner, used after Laravel is installed in ./src.
    entrypoint: ["php", "artisan"]
    command: ["list"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    <<: *php-service
    # Production-style Laravel queue worker.
    # Laravel dispatches jobs to Redis when QUEUE_CONNECTION=redis; without this
    # long-running process, those jobs remain queued and API Catalog sync never
    # runs after the HTTP request returns.
    #
    # This service intentionally reuses the same PHP image, source mount,
    # working directory, and internal laravel network as php-fpm so queued jobs
    # execute inside the same application environment as web requests.
    # No ports are published because workers are internal background processes.
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--timeout=120"]
    restart: unless-stopped
    depends_on:
      # Jobs may read/write MySQL and use Redis as the queue backend, so wait
      # for both dependencies before starting the worker loop.
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  composer:
    <<: *php-service
    # Composer runner. It writes files as UID/GID 1000 to avoid WSL/Windows permission issues.
    entrypoint: ["composer"]
    command: ["--version"]

  npm:
    image: codex-practice001-node:lts
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      args:
        UID: 1000
        GID: 1000
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      # File watching is more reliable across Docker Desktop / WSL2 shared filesystems.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    entrypoint:
      - sh
      - -lc
      - |
        if [ "$1" = "npm" ]; then
          shift
        fi
        exec npm "$@"
      - npm-wrapper
    command: ["--version"]
    networks:
      - laravel

  mysql:
    image: mysql:8.0
    ports:
      # Optional host access for DB tools. Laravel containers still use mysql:3306 internally.
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Tokyo
    volumes:
      # Persist database data between container restarts.
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laravel

  redis:
    image: redis:7-alpine
    # Redis is only used by Laravel containers on the internal Docker network.
    # Do not publish 6379 to the host; services connect with the "redis" host name.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - laravel

  mailpit:
    image: axllent/mailpit:latest
    ports:
      # SMTP: mailpit:1025 from Laravel, Web UI: http://localhost:8025
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - laravel

  adminer:
    image: adminer:latest
    ports:
      # Adminer Web UI: http://localhost:8081
      - "127.0.0.1:8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - laravel

  queue-worker:
    <<: *php-service
    # Legacy/profile-based queue practice runner.
    # Keep this separate from the production-style "queue" service above so old
    # learning commands still work, while the default stack has a clear worker
    # service that can be started with: docker compose up -d queue scheduler
    profiles: ["worker"]
    command: ["php", "artisan", "queue:work", "--verbose", "--tries=3", "--timeout=90"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    <<: *php-service
    # Production-style Laravel scheduler loop.
    # Laravel's Scheduler does not stay resident by itself; something must run
    # schedule:run every minute. This container provides that loop in Docker so
    # routes/console.php schedules, including API Catalog sync dispatches, are
    # evaluated automatically.
    #
    # The scheduler should enqueue work, not duplicate the sync implementation.
    # Actual queued jobs are processed by the "queue" service. No ports are
    # published because this is also an internal background process.
    command:
      - sh
      - -lc
      - |
        while true; do
          php artisan schedule:run --no-interaction
          sleep 60
        done
    restart: unless-stopped
    depends_on:
      # Scheduled tasks can dispatch Redis-backed jobs and may touch the DB
      # while evaluating Laravel schedule definitions.
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

networks:
  laravel:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
